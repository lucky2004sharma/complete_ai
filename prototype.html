<!DOCTYPE html>
<!-- 
======================================================================
* KYA KAR RAHA HAIN: NEW 2 - "Orbital Tracks" (Concentric layout)
* KYUN: Vinyl record ya planet orbits ki tarah, items square grid me nahi balki circular rings par hain.
======================================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageReducer // Orbital Tracks</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { mono: ['Roboto Mono', 'monospace'] }, colors: { indBg: '#F9FAFB', indPanel: '#E5E7EB', indText: '#111827', indOrange: '#FF6D00', indGreen: '#16A34A' } } } }
    </script>
    <style>
        body { background-color: #F9FAFB; overflow: hidden; }
        /* 
        * KYA: Orbits (Circles) banane ki styling 
        */
        .orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px dashed #D1D5DB; border-radius: 50%; z-index: 0; }
        .node { position: absolute; z-index: 10; transform: translate(-50%, -50%); }
    </style>
</head>
<body class="text-indText font-mono min-h-screen relative flex items-center justify-center">

    <!-- Orbits (Background rings) -->
    <div class="orbit w-[800px] h-[800px]"></div>
    <div class="orbit w-[500px] h-[500px]"></div>

    <!-- Center Hub (Universal) -->
    <div class="absolute z-20 w-48 h-48 bg-white border-4 border-indText rounded-full shadow-2xl flex flex-col items-center justify-center cursor-pointer hover:border-indOrange transition-colors">
        <span class="text-4xl text-indOrange font-black">+</span>
        <span class="font-black text-sm tracking-widest mt-2">UNI</span>
    </div>

    <!-- Nodes on the outer orbit -->
    <!-- Top Left Orbit Node -->
    <div class="node top-[15%] left-[20%] w-32 h-32 bg-indPanel p-1 rounded-full cursor-pointer group hover:scale-110 transition-transform">
        <div class="w-full h-full bg-white rounded-full border-2 border-dashed border-gray-400 flex flex-col items-center justify-center">
            <span class="border border-gray-300 text-gray-400 text-[10px] font-black px-1 -rotate-12 group-hover:text-indOrange">J&gt;P</span>
            <span class="font-black text-xs mt-1">JPG>PNG</span>
        </div>
    </div>

    <!-- Top Right Orbit Node -->
    <div class="node top-[15%] left-[80%] w-32 h-32 bg-indPanel p-1 rounded-full cursor-pointer group hover:scale-110 transition-transform">
        <div class="w-full h-full bg-white rounded-full border-2 border-dashed border-gray-400 flex flex-col items-center justify-center">
            <span class="border border-gray-300 text-gray-400 text-[10px] font-black px-1 -rotate-12 group-hover:text-indOrange">P&gt;J</span>
            <span class="font-black text-xs mt-1">PNG>JPG</span>
        </div>
    </div>

     <!-- Bottom Orbit Node -->
     <div class="node top-[85%] left-[50%] w-32 h-32 bg-indPanel p-1 rounded-full cursor-pointer group hover:scale-110 transition-transform">
        <div class="w-full h-full bg-white rounded-full border-2 border-dashed border-gray-400 flex flex-col items-center justify-center">
            <span class="border border-gray-300 text-gray-400 text-[10px] font-black px-1 -rotate-12 group-hover:text-indOrange">W&gt;J</span>
            <span class="font-black text-xs mt-1">WEBP>JPG</span>
        </div>
    </div>

</body>
</html>
