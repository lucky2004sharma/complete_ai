<!DOCTYPE html>
<!-- 
======================================================================
* KYA KAR RAHA HAIN: NEW 1 - "Isometric Command" (3D Floating layout)
* KYUN: CSS Transforms (rotateX, rotateZ) use karke page ko 3D angle par mod diya hai. 
*       Ye zameen par rakhe hardware blocks jaisa lagta hai. Very unique visual impact.
======================================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageReducer // Isometric Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { mono: ['Roboto Mono', 'monospace'] }, colors: { indBg: '#F9FAFB', indPanel: '#E5E7EB', indText: '#111827', indOrange: '#FF6D00', indGreen: '#16A34A' } } } }
    </script>
    <style>
        body { background-color: #F9FAFB; overflow-x: hidden; }
        /* 
        * KYA: Isometric 3D trick. 
        * KYUN: Container ko perspective deta hai, aur grid ko tilt karta hai.
        */
        .iso-container { perspective: 1000px; transform-style: preserve-3d; }
        .iso-grid { transform: rotateX(55deg) rotateZ(-45deg); }
        .iso-card { transition: transform 0.3s ease, box-shadow 0.3s ease; box-shadow: 10px 10px 0px rgba(0,0,0,0.1); }
        .iso-card:hover { transform: translateZ(20px); box-shadow: 20px 20px 0px rgba(255,109,0,0.3); }
    </style>
</head>
<body class="text-indText font-mono min-h-screen flex items-center justify-center py-20">

    <div class="iso-container w-full max-w-[800px] mx-auto">
        <div class="iso-grid grid grid-cols-2 gap-8 p-10">
            
            <!-- UNIVERSAL (Bada box, 2 columns) -->
            <div class="col-span-2 iso-card bg-white border-4 border-indText p-8 flex flex-col items-center justify-center cursor-pointer min-h-[200px]">
                <span class="text-6xl text-indOrange font-black mb-4">+</span>
                <h2 class="text-4xl font-black tracking-widest">UNIVERSAL_IO</h2>
            </div>

            <!-- Stamped Card 1 -->
            <div class="iso-card bg-indPanel p-2 border-2 border-gray-400 cursor-pointer group">
                <div class="bg-white p-6 border-2 border-dashed border-gray-400 h-full relative min-h-[150px]">
                    <div class="absolute top-2 right-2 border-2 border-gray-300 text-gray-400 text-xs font-black px-1 -rotate-12 group-hover:text-indOrange">J&gt;P</div>
                    <h3 class="text-2xl font-black mt-4">JPG > PNG</h3>
                </div>
            </div>

            <!-- Stamped Card 2 -->
            <div class="iso-card bg-indPanel p-2 border-2 border-gray-400 cursor-pointer group">
                <div class="bg-white p-6 border-2 border-dashed border-gray-400 h-full relative min-h-[150px]">
                    <div class="absolute top-2 right-2 border-2 border-gray-300 text-gray-400 text-xs font-black px-1 -rotate-12 group-hover:text-indOrange">P&gt;J</div>
                    <h3 class="text-2xl font-black mt-4">PNG > JPG</h3>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
