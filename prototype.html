<!DOCTYPE html>
<!-- 
======================================================================
* KYA KAR RAHA HAIN: HYBRID 3 - "Eclipse Grid" (Jigsaw Grid + Circular Radar)
* KYUN: CSS Grid use kiya hai (jigsaw ki tarah), par main Universal tool ek bada Circle hai. 
*       Ye circle square dabbo ke beech me "Eclipse" (grahan) jaisa lagta hai. Very contrasting geometry!
======================================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageReducer // Eclipse Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { mono: ['Roboto Mono', 'monospace'] }, colors: { indBg: '#F9FAFB', indPanel: '#E5E7EB', indText: '#111827', indOrange: '#FF6D00', indGreen: '#16A34A' } } } }
    </script>
    <style>
        body { background-color: #F9FAFB; background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px); background-size: 40px 40px; }
    </style>
</head>
<body class="text-indText font-mono min-h-screen p-8">

    <div class="max-w-[1200px] mx-auto">
        <h1 class="text-4xl font-black mb-10 text-indText uppercase">Eclipse Engine</h1>

        <!-- Asymmetric CSS Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center justify-items-center">
            
            <!-- STAMPED BOX 1: Left Square -->
            <div class="w-full bg-indPanel p-2 border-2 border-gray-300 shadow-sm group cursor-pointer hover:border-indOrange transition-colors">
                <div class="bg-white p-6 border-2 border-dashed border-gray-400 flex flex-col items-start min-h-[200px]">
                    <div class="border-2 border-gray-300 text-gray-400 text-sm font-black px-2 py-1 -rotate-12 group-hover:text-indOrange mb-4">J&gt;P</div>
                    <h3 class="text-2xl font-black mb-2">JPG TO PNG</h3>
                    <p class="text-xs font-bold text-gray-500">Lossless Extraction</p>
                </div>
            </div>

            <!-- 
            * KYA: UNIVERSAL CIRCLE. Col-span-1 par center me hai. Circle (rounded-full)
            * KYUN: Square grid ke bich ek bada gol circle attention kheenchta hai.
            -->
            <div class="w-[300px] h-[300px] bg-indText p-2 rounded-full shadow-2xl flex items-center justify-center cursor-pointer hover:scale-105 transition-transform relative z-10 border-4 border-indOrange">
                <div class="w-full h-full bg-white rounded-full border-4 border-dashed border-gray-400 flex flex-col items-center justify-center p-6 text-center">
                    <span class="text-5xl text-indOrange font-black mb-2">+</span>
                    <h2 class="text-2xl font-black">UNIVERSAL<br/>SPHERE</h2>
                </div>
            </div>

            <!-- STAMPED BOX 2: Right Square -->
            <div class="w-full bg-indPanel p-2 border-2 border-gray-300 shadow-sm group cursor-pointer hover:border-indOrange transition-colors">
                <div class="bg-white p-6 border-2 border-dashed border-gray-400 flex flex-col items-end text-right min-h-[200px]">
                    <div class="border-2 border-gray-300 text-gray-400 text-sm font-black px-2 py-1 -rotate-12 group-hover:text-indOrange mb-4">P&gt;J</div>
                    <h3 class="text-2xl font-black mb-2">PNG TO JPG</h3>
                    <p class="text-xs font-bold text-gray-500">Max Compression</p>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
