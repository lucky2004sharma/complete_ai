<!DOCTYPE html>
<!-- 
======================================================================
* KYA KAR RAHA HAIN: HYBRID 4 - "Tech Tree" (Timeline flow + Clipped Shapes)
* KYUN: Upar Universal Converter hai jisse lines nikal kar niche wale modules me ja rahi hain. 
*       Hierarchy (tree structure) dikhata hai.
======================================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageReducer // Tech Tree</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { mono: ['Roboto Mono', 'monospace'] }, colors: { indBg: '#F9FAFB', indPanel: '#E5E7EB', indText: '#111827', indOrange: '#FF6D00', indGreen: '#16A34A' } } } }
    </script>
    <style>
        body { background-color: #F9FAFB; background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px); background-size: 40px 40px; }
        .clip-slant { clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0% 100%); }
    </style>
</head>
<body class="text-indText font-mono min-h-screen py-12 flex flex-col items-center">

    <div class="w-full max-w-[1000px] flex flex-col items-center">
        
        <!-- UNIVERSAL NODE (Root) -->
        <div class="w-[400px] bg-indText p-1 clip-slant shadow-xl z-10 relative">
            <div class="bg-white p-8 clip-slant border-2 border-gray-400 text-center flex flex-col items-center cursor-pointer hover:border-indOrange transition">
                <span class="text-3xl text-indOrange font-black mb-2">+</span>
                <h2 class="text-2xl font-black">ROOT_UNIVERSAL</h2>
            </div>
        </div>

        <!-- 
        * KYA: SVG Lines for Tree Branches 
        * KYUN: Timeline/flow dikhane ke liye
        -->
        <svg class="w-full h-[100px] -mt-2 -mb-2 z-0" preserveAspectRatio="none">
            <!-- Center line -->
            <line x1="50%" y1="0" x2="50%" y2="100%" stroke="#111827" stroke-width="3" stroke-dasharray="6,6"/>
            <!-- Left Branch -->
            <line x1="50%" y1="50%" x2="20%" y2="50%" stroke="#111827" stroke-width="3" stroke-dasharray="6,6"/>
            <line x1="20%" y1="50%" x2="20%" y2="100%" stroke="#111827" stroke-width="3" stroke-dasharray="6,6"/>
            <!-- Right Branch -->
            <line x1="50%" y1="50%" x2="80%" y2="50%" stroke="#111827" stroke-width="3" stroke-dasharray="6,6"/>
            <line x1="80%" y1="50%" x2="80%" y2="100%" stroke="#111827" stroke-width="3" stroke-dasharray="6,6"/>
        </svg>

        <!-- CHILD NODES (Stamps in Slanted boxes) -->
        <div class="w-full flex justify-between px-10 relative z-10">
            
            <div class="w-[280px] bg-indPanel p-1 clip-slant shadow-md group cursor-pointer">
                <div class="bg-white p-6 clip-slant border-2 border-dashed border-gray-400 flex items-center justify-between">
                    <div class="border border-gray-300 text-gray-400 text-[10px] font-black px-1 -rotate-12 group-hover:text-indOrange">J&gt;P</div>
                    <h3 class="text-lg font-black text-right">JPG > PNG</h3>
                </div>
            </div>

            <div class="w-[280px] bg-indPanel p-1 clip-slant shadow-md group cursor-pointer">
                <div class="bg-white p-6 clip-slant border-2 border-dashed border-gray-400 flex items-center justify-center">
                    <h3 class="text-lg font-black">WEBP > JPG</h3>
                    <div class="border border-gray-300 text-gray-400 text-[10px] font-black px-1 -rotate-12 group-hover:text-indOrange ml-2">W&gt;J</div>
                </div>
            </div>

            <div class="w-[280px] bg-indPanel p-1 clip-slant shadow-md group cursor-pointer">
                <div class="bg-white p-6 clip-slant border-2 border-dashed border-gray-400 flex items-center justify-between">
                    <h3 class="text-lg font-black">PNG > JPG</h3>
                    <div class="border border-gray-300 text-gray-400 text-[10px] font-black px-1 -rotate-12 group-hover:text-indOrange">P&gt;J</div>
                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
