<!DOCTYPE html>
<!-- 
======================================================================
* KYA KAR RAHA HAIN: HYBRID 5 - "Pill & Blade" (Jigsaw uneven sizes + Extreme Curves/Cuts)
* KYUN: Kuch boxes bilkul gol (Pill shape) hain aur kuch bilkul teekhe (Blade shape). 
*       Contrast between soft curves and harsh angles creates tension.
======================================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageReducer // Pill & Blade</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { mono: ['Roboto Mono', 'monospace'] }, colors: { indBg: '#F9FAFB', indPanel: '#E5E7EB', indText: '#111827', indOrange: '#FF6D00', indGreen: '#16A34A' } } } }
    </script>
    <style>
        body { background-color: #F9FAFB; background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px); background-size: 40px 40px; }
        .clip-blade { clip-path: polygon(0 0, 100% 0, 80% 100%, 0% 100%); }
    </style>
</head>
<body class="text-indText font-mono min-h-screen p-12">

    <div class="max-w-[1200px] mx-auto flex flex-col gap-6">
        
        <!-- UNIVERSAL: The Pill (Fully rounded) -->
        <div class="w-full bg-indText p-2 rounded-full shadow-2xl cursor-pointer hover:bg-indOrange transition-colors">
            <div class="bg-white rounded-full p-8 border-4 border-dashed border-gray-400 flex items-center justify-between">
                <div class="w-20 h-20 bg-indOrange rounded-full text-white flex items-center justify-center text-4xl font-black shrink-0">+</div>
                <h2 class="text-4xl font-black text-center w-full">UNIVERSAL CAPSULE</h2>
                <div class="w-20 h-20 shrink-0"></div> <!-- Spacer for balance -->
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-6 mt-4">
            
            <!-- STAMPED BOX 1: The Blade (Clipped sharp edge) -->
            <div class="w-full md:w-1/2 bg-indPanel p-1 clip-blade shadow-md group cursor-pointer">
                <div class="bg-white p-8 clip-blade border-2 border-dashed border-gray-400 flex justify-between h-full min-h-[150px]">
                    <div>
                        <h3 class="text-2xl font-black mb-2">JPG TO PNG</h3>
                        <p class="text-xs font-bold text-gray-500">Lossless edge.</p>
                    </div>
                    <!-- Rotated Stamp -->
                    <div class="border-2 border-gray-300 text-gray-400 text-sm font-black px-2 py-1 -rotate-12 group-hover:text-indOrange self-start mr-8">J&gt;P</div>
                </div>
            </div>

            <!-- STAMPED BOX 2: The Block (Standard solid contrast) -->
            <div class="w-full md:w-1/2 bg-white border-4 border-indText shadow-[8px_8px_0_#FF6D00] p-6 group cursor-pointer hover:-translate-y-1 transition-transform relative">
                <div class="absolute bottom-4 right-4 border-2 border-gray-300 text-gray-400 text-sm font-black px-2 py-1 -rotate-12 group-hover:text-indText">P&gt;J</div>
                <h3 class="text-2xl font-black mb-2">PNG TO JPEG</h3>
                <p class="text-xs font-bold text-gray-500">Heavy block compression.</p>
            </div>

        </div>
    </div>
</body>
</html>
