<!DOCTYPE html>
<!-- 
======================================================================
* KYA KAR RAHA HAIN: NEW 5 - "Scattered Desk" (Chaotic Absolute Positioning)
* KYUN: Cards grid me nahi hain. Aisa lagta hai jaise kisi ne cards ko table par fenk diya ho. 
*       Rotations (-rotate-3, rotate-6) aur overlapping use karke ek creative, un-structured look diya hai.
======================================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageReducer // Scattered Desk</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { mono: ['Roboto Mono', 'monospace'] }, colors: { indBg: '#F9FAFB', indPanel: '#E5E7EB', indText: '#111827', indOrange: '#FF6D00', indGreen: '#16A34A' } } } }
    </script>
    <style>
        body { background-color: #E5E7EB; background-image: radial-gradient(rgba(0,0,0,0.1) 1px, transparent 1px); background-size: 20px 20px; overflow-x: hidden;}
    </style>
</head>
<body class="text-indText font-mono min-h-screen relative py-20 flex justify-center">

    <div class="w-[900px] h-[600px] relative">
        
        <!-- UNIVERSAL (Center, main layer) -->
        <div class="absolute top-[20%] left-[25%] w-[400px] bg-white p-8 border-4 border-indText shadow-2xl z-20 cursor-pointer hover:scale-105 transition-transform rotate-2">
            <h2 class="text-3xl font-black mb-4">UNIVERSAL I/O</h2>
            <div class="border-2 border-dashed border-gray-400 bg-gray-50 p-8 text-center">
                <span class="text-4xl text-indOrange font-black">+</span>
            </div>
        </div>

        <!-- STAMPED CARD: J>P (Top Left, tucked under) -->
        <div class="absolute top-[5%] left-[5%] w-64 bg-indPanel p-2 border-2 border-gray-400 shadow-lg z-10 -rotate-6 cursor-pointer hover:z-30 hover:scale-105 transition-all group">
            <div class="bg-white p-6 border-2 border-dashed border-gray-400 relative min-h-[150px]">
                <div class="absolute top-2 right-2 border-2 border-gray-300 text-gray-400 text-xs font-black px-1 -rotate-12 group-hover:text-indOrange">J&gt;P</div>
                <h3 class="text-2xl font-black mt-4">JPG > PNG</h3>
            </div>
        </div>

        <!-- STAMPED CARD: P>J (Bottom Right, popping out) -->
        <div class="absolute bottom-[15%] right-[10%] w-64 bg-indPanel p-2 border-2 border-gray-400 shadow-lg z-30 rotate-12 cursor-pointer hover:scale-105 transition-all group">
            <div class="bg-white p-6 border-2 border-dashed border-gray-400 relative min-h-[150px]">
                <div class="absolute top-2 right-2 border-2 border-gray-300 text-gray-400 text-xs font-black px-1 -rotate-12 group-hover:text-indOrange">P&gt;J</div>
                <h3 class="text-2xl font-black mt-4">PNG > JPG</h3>
            </div>
        </div>

        <!-- STAMPED CARD: W>J (Top Right, floating away) -->
        <div class="absolute top-[10%] right-[15%] w-64 bg-indPanel p-2 border-2 border-gray-400 shadow-lg z-10 -rotate-3 cursor-pointer hover:z-30 hover:scale-105 transition-all group">
            <div class="bg-white p-6 border-2 border-dashed border-gray-400 relative min-h-[150px]">
                <div class="absolute top-2 right-2 border-2 border-gray-300 text-gray-400 text-xs font-black px-1 -rotate-12 group-hover:text-indOrange">W&gt;J</div>
                <h3 class="text-2xl font-black mt-4">WEBP > JPG</h3>
            </div>
        </div>

    </div>

</body>
</html>
